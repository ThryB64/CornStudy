name: weekly-maintenance

# V181 — Maintenance hebdomadaire research : santé du système d'accumulation forward.
# Vérifie CI/head/couches/archives/tests critiques + prochains jalons, commite le rapport.

on:
  schedule:
    - cron: "0 6 * * 6"   # samedi 08h00 Europe/Paris (heure d'été) -> 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-maintenance
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install pandas pyarrow requests numpy scipy scikit-learn pytest

      - name: Weekly maintenance (checks + tests critiques)
        run: python scripts/run_weekly_maintenance.py

      - name: Commit report
        run: |
          git config user.name "weekly-maintenance-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/weekly artefacts/v181 || true
          git diff --cached --quiet || git commit -m "chore(weekly): maintenance report $(date -u +%F)"
          git push || true
