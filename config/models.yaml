# models.yaml - Configuration nettoyée des 50+ modèles.
# Remplace Models/config.yaml dont la cible était cassée (is_last_lightning_cloud_ground).
#
# Chaque modèle déclare:
#   task_types  : tâches supportées (regression, binary, multiclass, ordinal, quantile)
#   requires    : ce qu'il lui faut (time_index, exogenous, panel, etc.)
#   min_samples : seuil de données minimal
#   group       : baseline | classical_ts | ml | dl | meta

dataset:
  features_path: data/processed/features.parquet
  targets_path: data/processed/targets.parquet
  date_col: Date
  # CIBLES (corrigées : ce sont les vraies, plus is_last_lightning_cloud_ground)
  primary_targets:
    - y_logret_h5
    - y_logret_h10
    - y_logret_h20
    - y_logret_h30
  classification_targets:
    - y_class_h5
    - y_class_h10
    - y_class_h20
    - y_class_h30
  binary_targets:
    - y_up_h5
    - y_up_h10
    - y_up_h20
    - y_up_h30

walkforward:
  enabled: true
  retrain_strategy: monthly_rolling   # plus serré que yearly_rolling
  initial_train_years: 8
  step_days: 21                       # ~1 mois
  embargo_days: 30                    # purge horizon-dépendant
  min_train_rows: 500

cv:
  inner_splits: 3                     # CV interne pour Optuna
  purge_days: 30
  embargo_days: 5

metrics:
  regression:
    - rmse
    - mae
    - mase                            # Mean Absolute Scaled Error (vs naive)
    - directional_accuracy
    - pinball_q10
    - pinball_q90
  classification:
    - balanced_accuracy
    - log_loss
    - brier_score
    - calibration_ece                 # Expected Calibration Error
  agronomic:
    - decision_pnl_vs_baseline_dollar_per_bu
    - storage_avoided_loss_dollar_per_bu

feature_selection:
  default_mode: universal             # cf. EXPLICATION_SELECTION_VARIABLES.md
  k_final:
    mode: optimize
    min: 20
    max: 200
    step: 10
  cluster_modes_to_try:
    - none
    - medoid_per_cluster
    - topk_per_cluster

optimization:
  enabled: true
  framework: optuna
  n_trials_default: 30
  pruner: median
  composite_score:
    formula: "r2_oos + 0.001 * ic + 0.01 * directional_accuracy"

# ============================================================================
# Catalogue de modèles
# ============================================================================
models:

