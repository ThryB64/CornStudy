- title: Measuring price discovery between nearby and deferred contracts in storable
    and nonstorable commodity futures markets
  authors: Zhepeng Hu, Mindy Mallory, Teresa Serra, Philip Garcia
  year: 2020
  venue: Agricultural Economics
  doi: 10.1111/agec.12594
  url: https://doi.org/10.1111/agec.12594
  abstract_if_available: "<jats:title>Abstract</jats:title><jats:p>Using price discovery\
    \ measures, including Putni\u0146\u0161\u2019 (2013) information leadership share\
    \ and intraday data, we quantify the proportional contribution of nearby and deferred\
    \ contracts in price discovery in the corn and live cattle futures markets. On\
    \ average, nearby contracts reflect information more quickly than deferred contracts\
    \ in the corn market, but have a relatively less dominant role in the live cattle\
    \ market. In both markets, the nearby contract loses dominance when its relative\
    \ volume share dips below 50%, which typically occurs when the nearby is close\
    \ to maturity. Regression results indicate that the share of price discovery is\
    \ mainly related to trading volume and time to expiration in both markets. In\
    \ the corn market, price discovery share between nearby and deferred contracts\
    \ is also related to inverse carrying charges, crop year differences, USDA announcements,\
    \ market crashes, and commodity index position rolls. Differences between corn\
    \ and live cattle markets are consistent with differences in the contracts\u2019\
    \ liquidity and commodity storability.</jats:p>"
