- title: The weather premium in the U.S. corn market
  authors: Ziran Li, Dermot J. Hayes, Keri L. Jacobs
  year: 2018
  venue: Journal of Futures Markets
  doi: 10.1002/fut.21884
  url: https://doi.org/10.1002/fut.21884
  abstract_if_available: "<jats:sec><jats:label/><jats:p>We show that the weather\
    \ premium, an anecdotal phenomenon in the U.S. corn futures market, can arise\
    \ from a convex demand function. We further show that the magnitude of the weather\
    \ premium depends on the carryout and expected yield at harvest. We use data from\
    \ 1968 to 2015 to evaluate the accuracy of the December futures price as a forecast\
    \ of the harvest price. A predictable component in the forecast error is consistent\
    \ with the existence of a time\u2010varying weather premium. We demonstrate that\
    \ a passive strategy of routinely shorting the corn December futures does not\
    \ provide an attractive risk\u2010adjusted return.</jats:p></jats:sec>"
