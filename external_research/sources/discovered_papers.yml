- title: Do Corn Options Update Volatility Expectations in the Wake of USDA Reports?
  authors: Yao Yang, Andrew McKenzie
  year: 2025
  venue: Journal of Futures Markets
  doi: 10.1002/fut.70020
  url: https://doi.org/10.1002/fut.70020
  abstract_if_available: "<jats:title>ABSTRACT</jats:title>\n                  <jats:p>This\
    \ paper investigates the information value of U.S. Department of Agriculture (USDA)\
    \ crop reports in terms of their impact\_on rational agents' expectations of future\
    \ realized price volatility. While it is well known that uncertainty\u2014proxied\
    \ by options market implied volatility\u2014is reduced in the wake of USDA reports,\
    \ this is the first study to examine whether the information contained in USDA\
    \ reports impacts market agents' ex ante expectations of realized volatility (RV).\
    \ We use a Hamilton\u2010type approach to reveal how August crop reports refine\
    \ volatility expectations, and movements in RV in the post report period mirror\
    \ these expectations. Importantly, in the wake of the USDA report releases, corn\
    \ options partially reflect updates in volatility expectations. These updates\
    \ are not instantaneous, highlighting potential short\u2010term pricing misalignments\
    \ over the first 2\u2009days following the report release.</jats:p>"
